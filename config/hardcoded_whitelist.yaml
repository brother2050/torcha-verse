# =============================================================================
# Hardcoding scanner exemption list
# =============================================================================
# Used by `scripts/check_hardcoding.py --whitelist config/hardcoded_whitelist.yaml`.
#
# Each entry under `exemptions` suppresses (or downgrades) matching
# violations. A violation matches when ALL of its specified fields match;
# omitted fields match anything.
#
# Fields (D1 v0.4.x extension):
#   file:             glob pattern matched against the violation's relative
#                     path. Examples: "core/model_registry.py", "core/*.py".
#   type:             violation type. One of:
#                       - string_literal
#                       - numeric_literal
#                       - path_literal
#                       - list_literal
#                       - "*" or "all"   (exempt every type)
#   line:             (optional) exact line number to exempt.
#   content_contains: (optional) substring that must appear in the
#                     violation content (matched case-sensitively).
#   severity:         (optional) downgrade matching violation to this level
#                     ("info" / "warn" / "critical"). The violation is still
#                     reported at the new level.
#   protocol_format:  (optional, boolean) mark as protocol/format identifier
#                     (see docs/hardcoding_convention.md section 1.3). Sets
#                     severity to "info" implicitly.
#   reason:           (optional) human-readable rationale. Strongly
#                     recommended for all terminal exemptions.
#
# Reference: docs/hardcoding_convention.md (D1).
#
# A non-terminal exemption (with `severity` or `protocol_format: true`) only
# downgrades the severity; a terminal exemption removes the violation
# entirely.  Use non-terminal exemptions whenever possible -- they keep
# the violation visible for future audits.
# =============================================================================

exemptions:
  # ----------------------------------------------------------------
  # Group 1: 训练超参 (training hyperparams) — structural / info
  # ----------------------------------------------------------------
  # SFT trainer 默认值 (lr / epochs / batch / seed)。这些是作者层维护
  # 的训练默认值,用户应当通过 config/inference_config.yaml 覆盖,而
  # 不是改源码。把它们降级为 info,允许在源码中保留(作为参考值)。
  - file: "training/sft_trainer.py"
    type: "numeric_literal"
    severity: "info"
    reason: "SFT 训练超参 (lr/epochs/batch/seed), 默认值"

  - file: "training/rlhf_trainer.py"
    type: "numeric_literal"
    severity: "info"
    reason: "RLHF 训练超参 (kl_coef/clip_range/gamma/lam), 默认值"

  - file: "training/synthetic_data.py"
    type: "numeric_literal"
    severity: "info"
    reason: "Synthetic data 生成超参 (num_samples/temperature), 默认值"

  - file: "training/dataset.py"
    type: "numeric_literal"
    severity: "info"
    reason: "Dataset 默认 max_length (512/256), 默认值"

