  # ----------------------------------------------------------------
  # Group 18: logger 专用批量 exemption (Task D, D1 阶段二)
  # ----------------------------------------------------------------
  # 当前 scanner 已通过 is_log_message_format 启发式 (Group: heuristic)
  # 把 logger.{level}(format) 自动降为 info。这里加一批**显式**
  # exemption 作为冗余安全网:
  #
  # 1. 万一未来启发式被关,这条 exemption 仍能 catch 住 (defence in depth)
  # 2. 审计: PR review 时能直接看到"这是 log message"的人工 rationale
  # 3. 不依赖于 "literal 是 logger 调用的第一个参数" 的精确判断
  #    (例如 kwargs 形式的 logger.bind(...).info(...) 也可命中)
