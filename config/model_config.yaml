# =============================================================================
# Model Configuration
# =============================================================================

# Default model settings
default:
  dtype: "bf16"                    # bf16 | fp16 | fp32
  device: "auto"                   # auto | cuda | cpu | mps
  quantization: null               # null | int8 | int4 | gptq | awq
  max_seq_len: 4096
  trust_remote_code: true

# Text models
text_models:
  llama-8b:
    name: "Llama-3-8B"
    path: "meta-llama/Meta-Llama-3-8B"
    architecture: "decoder_only"
    dtype: "bf16"
    max_seq_len: 8192
    num_layers: 32
    num_heads: 32
    num_kv_heads: 8                 # GQA
    hidden_size: 4096
    intermediate_size: 14336
    vocab_size: 128256
    rope_theta: 500000.0

  qwen2-7b:
    name: "Qwen2-7B"
    path: "Qwen/Qwen2-7B"
    architecture: "decoder_only"
    dtype: "bf16"
    max_seq_len: 32768
    num_layers: 28
    num_heads: 28
    num_kv_heads: 4
    hidden_size: 3584
    intermediate_size: 18944
    vocab_size: 152064

  mixtral-8x7b:
    name: "Mixtral-8x7B"
    path: "mistralai/Mixtral-8x7B-v0.1"
    architecture: "moe"
    dtype: "bf16"
    max_seq_len: 32768
    num_layers: 32
    num_heads: 32
    num_kv_heads: 8
    hidden_size: 4096
    intermediate_size: 14336
    num_experts: 8
    num_experts_per_tok: 2
    vocab_size: 32000

# Image models
image_models:
  sd15:
    name: "Stable-Diffusion-1.5"
    path: "runwayml/stable-diffusion-v1-5"
    architecture: "unet"
    dtype: "fp16"
    latent_channels: 4
    image_size: 512
    vae_name: "sd15-vae"

  sdxl:
    name: "Stable-Diffusion-XL"
    path: "stabilityai/stable-diffusion-xl-base-1.0"
    architecture: "unet"
    dtype: "fp16"
    latent_channels: 4
    image_size: 1024
    vae_name: "sdxl-vae"

  sd3:
    name: "Stable-Diffusion-3"
    path: "stabilityai/stable-diffusion-3-medium"
    architecture: "dit"
    dtype: "bf16"
    latent_channels: 16
    image_size: 1024
    vae_name: "sd3-vae"

# Audio models
audio_models:
  cosyvoice:
    name: "CosyVoice"
    path: "local/cosyvoice"
    architecture: "tts_transformer"
    dtype: "bf16"
    sample_rate: 24000

  hifi-gan:
    name: "HiFi-GAN"
    path: "local/hifi-gan"
    architecture: "vocoder"
    dtype: "fp32"
    sample_rate: 22050

# Video models
video_models:
  wan2-2:
    name: "Wan2.2"
    path: "local/wan2.2"
    architecture: "video_dit"
    dtype: "bf16"
    latent_channels: 16
    num_frames: 81
    fps: 16

# Digital human models
digital_human_models:
  musetalk:
    path: "TMElyralab/MuseTalk"
    architecture: "musetalk"
    source: "huggingface"
  liveportrait:
    path: "KwaiVGI/LivePortrait"
    architecture: "liveportrait"
    source: "huggingface"
  sadtalker:
    path: "OpenTalker/SadTalker"
    architecture: "sadtalker"
    source: "huggingface"
  echo_mimic_v2:
    path: "antgroup/echomimic_v2"
    architecture: "echo_mimic"
    source: "huggingface"
  face_enhance:
    gfpgan:
      path: "TencentARC/GFPGAN"
      source: "github"
    codeformer:
      path: "sczhou/CodeFormer"
      source: "github"
  voice_clone:
    cosyvoice:
      path: "FunAudioLLM/CosyVoice2-0.5B"
      source: "modelscope"
    f5_tts:
      path: "SWivid/F5-TTS"
      source: "huggingface"
    chat_tts:
      path: "2noise/ChatTTS"
      source: "huggingface"
